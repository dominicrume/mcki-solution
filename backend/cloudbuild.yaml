# Google Cloud Build — CI/CD for MCKI AI Navigator
# Deploys to Cloud Run (europe-west2 = UK South) for GDPR compliance
# Run: gcloud builds submit --config=cloudbuild.yaml

steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "europe-west2-docker.pkg.dev/$PROJECT_ID/mcki/ai-navigator:$COMMIT_SHA"
      - "."
    dir: "backend"

  # Step 2: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "europe-west2-docker.pkg.dev/$PROJECT_ID/mcki/ai-navigator:$COMMIT_SHA"

  # Step 3: Deploy to Cloud Run (UK South)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mcki-ai-navigator
      - "--image=europe-west2-docker.pkg.dev/$PROJECT_ID/mcki/ai-navigator:$COMMIT_SHA"
      - "--region=europe-west2"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=ENVIRONMENT=production"

images:
  - "europe-west2-docker.pkg.dev/$PROJECT_ID/mcki/ai-navigator:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
