name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: gen-lang-client-0383449185
  REGION: europe-west2
  BACKEND_SERVICE: mcki-ai-navigator
  FRONTEND_SERVICE: mcki-frontend
  BACKEND_URL: https://mcki-ai-navigator-1090728564162.europe-west2.run.app
  # Production project: gen-lang-client-0383449185 (mcki-solutions)

jobs:
  deploy-backend:
    name: Deploy FastAPI Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --source ./backend \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --project $PROJECT_ID \
            --quiet

  deploy-frontend:
    name: Deploy Next.js Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Frontend
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --source . \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NEXT_PUBLIC_API_URL=$BACKEND_URL" \
            --project $PROJECT_ID \
            --quiet
