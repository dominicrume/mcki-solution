name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: gen-lang-client-0383449185
  REGION: europe-west2
  BACKEND_SERVICE: mcki-ai-navigator
  FRONTEND_SERVICE: mcki-frontend
  BACKEND_URL: https://mcki-ai-navigator-1090728564162.europe-west2.run.app

jobs:
  # ── Frontend deploys on every push (independent of backend) ───────────────
  deploy-frontend:
    name: Deploy Next.js Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --source . \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NEXT_PUBLIC_API_URL=$BACKEND_URL,RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},RESEND_FROM_EMAIL=noreply@mckisolutions.com,OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},LEAD_NOTIFICATION_EMAIL=Info@mckisolutions.com,CRM_NOTIFICATION_EMAIL=adammasum74@gmail.com" \
            --project $PROJECT_ID \
            --quiet

  # ── Backend only deploys when backend files change ─────────────────────────
  deploy-backend:
    name: Deploy FastAPI Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --source ./backend \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --project $PROJECT_ID \
            --quiet
